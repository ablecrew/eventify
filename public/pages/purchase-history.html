<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Eventify | Purchase History</title>
    <link rel="icon" href="../favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" media="screen" href="../main.css" />
    <link
      rel="stylesheet"
      type="text/css"
      media="screen"
      href="../css/purchase-history-page.css"
    />
    <!-- notyf -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/notyf/notyf.min.css"
    />
    
    <!-- PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- Barcode Generation -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    
    <script type="module" src="../main.js"></script>
  </head>
  <body>
    <div id="navbar-container"></div>

    <main class="purchase-history">
      <h1>Purchase History</h1>

      <div id="ticket-list" class="ticket-list">
        <!-- Skeleton Loaders -->
        <div class="ticket-item skeleton-loader">
          <div class="ticket-image">
            <div class="skeleton" style="width: 100%; height: 100%;"></div>
          </div>
          <div class="ticket-details">
            <div class="ticket-header">
              <div class="skeleton" style="height: 28px; width: 60%; margin-bottom: 8px; border-radius: 4px;"></div>
              <div class="ticket-meta">
                <div class="skeleton" style="height: 16px; width: 80px; margin-right: 12px; border-radius: 4px;"></div>
                <div class="skeleton" style="height: 20px; width: 50px; border-radius: 12px;"></div>
              </div>
            </div>
            <div class="purchase-info">
              <div class="purchase-date">
                <div class="skeleton" style="width: 16px; height: 16px; margin-right: 8px; border-radius: 2px;"></div>
                <div class="skeleton" style="height: 16px; width: 140px; border-radius: 4px;"></div>
              </div>
              <div class="ticket-price">
                <div class="skeleton" style="height: 20px; width: 80px; margin-right: 16px; border-radius: 4px;"></div>
                <div class="skeleton" style="height: 32px; width: 120px; border-radius: 6px;"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="ticket-item skeleton-loader">
          <div class="ticket-image">
            <div class="skeleton" style="width: 100%; height: 100%;"></div>
          </div>
          <div class="ticket-details">
            <div class="ticket-header">
              <div class="skeleton" style="height: 28px; width: 60%; margin-bottom: 8px; border-radius: 4px;"></div>
              <div class="ticket-meta">
                <div class="skeleton" style="height: 16px; width: 80px; margin-right: 12px; border-radius: 4px;"></div>
                <div class="skeleton" style="height: 20px; width: 50px; border-radius: 12px;"></div>
              </div>
            </div>
            <div class="purchase-info">
              <div class="purchase-date">
                <div class="skeleton" style="width: 16px; height: 16px; margin-right: 8px; border-radius: 2px;"></div>
                <div class="skeleton" style="height: 16px; width: 140px; border-radius: 4px;"></div>
              </div>
              <div class="ticket-price">
                <div class="skeleton" style="height: 20px; width: 80px; margin-right: 16px; border-radius: 4px;"></div>
                <div class="skeleton" style="height: 32px; width: 120px; border-radius: 6px;"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="ticket-item skeleton-loader">
          <div class="ticket-image">
            <div class="skeleton" style="width: 100%; height: 100%;"></div>
          </div>
          <div class="ticket-details">
            <div class="ticket-header">
              <div class="skeleton" style="height: 28px; width: 60%; margin-bottom: 8px; border-radius: 4px;"></div>
              <div class="ticket-meta">
                <div class="skeleton" style="height: 16px; width: 80px; margin-right: 12px; border-radius: 4px;"></div>
                <div class="skeleton" style="height: 20px; width: 50px; border-radius: 12px;"></div>
              </div>
            </div>
            <div class="purchase-info">
              <div class="purchase-date">
                <div class="skeleton" style="width: 16px; height: 16px; margin-right: 8px; border-radius: 2px;"></div>
                <div class="skeleton" style="height: 16px; width: 140px; border-radius: 4px;"></div>
              </div>
              <div class="ticket-price">
                <div class="skeleton" style="height: 20px; width: 80px; margin-right: 16px; border-radius: 4px;"></div>
                <div class="skeleton" style="height: 32px; width: 120px; border-radius: 6px;"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="footer-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/notyf/notyf.min.js"></script>
    <script type="module" src="../scripts/purchase-history.js"></script>
  </body>
</html>
