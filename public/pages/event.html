<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Eventify | Event</title>
    <link rel="icon" href="../favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" media="screen" href="../main.css" />
    <link
      rel="stylesheet"
      type="text/css"
      media="screen"
      href="../css/event-page.css"
    />
    <!-- notyf -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/notyf/notyf.min.css"
    />
    <script type="module" src="../main.js"></script>
    <script type="module" src="../scripts/event-page.js"></script>
  </head>
  <body>
    <div id="navbar-container"></div>

    <main class="event-page">
      <div class="container">
        <!-- Event Header -->
        <div class="skeleton-event-header">
          <div class="skeleton-event-image skeleton"></div>
          <div class="skeleton-event-content">
            <div class="skeleton-event-title skeleton"></div>
            <div class="skeleton-event-price skeleton"></div>
            
            <div class="skeleton-meta-section">
              <div class="skeleton-meta-title skeleton"></div>
              <div class="skeleton-dropdown skeleton"></div>
            </div>
            
            <div class="skeleton-meta-section">
              <div class="skeleton-meta-title skeleton"></div>
              <div class="skeleton-dropdown skeleton"></div>
            </div>
            
            <div class="skeleton-meta-section">
              <div class="skeleton-meta-title skeleton"></div>
              <div class="skeleton-location-info skeleton"></div>
            </div>
            
            <div class="skeleton-action-buttons">
              <div class="skeleton-btn skeleton"></div>
              <div class="skeleton-btn skeleton"></div>
            </div>
          </div>
        </div>

        <!-- Details Section -->
        <div class="skeleton-details-section">
          <div class="skeleton-details-title skeleton"></div>
          <div class="skeleton-details-text skeleton"></div>
          <div class="skeleton-details-text skeleton"></div>
          <div class="skeleton-details-text skeleton"></div>
        </div>

        <!-- Related Events -->
        <section class="events-section">
          <h2 class="event-section-title">Related Events</h2>
          <div class="events-grid" id="related-events-container">
            <!-- Event cards will be dynamically inserted here -->
            <!-- Loading placeholder can be shown initially -->
            <div class="event-card">
              <div class="skeleton-image skeleton"></div>
              <div class="skeleton-details">
                <div class="skeleton-title skeleton"></div>
                <div class="skeleton-category skeleton"></div>
                <div class="skeleton-info">
                  <div class="skeleton-date">
                    <div class="skeleton-month skeleton"></div>
                    <div class="skeleton-day skeleton"></div>
                  </div>
                  <div class="skeleton-location-time">
                    <div class="skeleton-location skeleton"></div>
                    <div class="skeleton-time skeleton"></div>
                  </div>
                </div>
                <div class="skeleton-price-section">
                  <div class="skeleton-price skeleton"></div>
                  <div class="skeleton-view skeleton"></div>
                </div>
              </div>
            </div>

            <div class="event-card">
              <div class="skeleton-image skeleton"></div>
              <div class="skeleton-details">
                <div class="skeleton-title skeleton"></div>
                <div class="skeleton-category skeleton"></div>
                <div class="skeleton-info">
                  <div class="skeleton-date">
                    <div class="skeleton-month skeleton"></div>
                    <div class="skeleton-day skeleton"></div>
                  </div>
                  <div class="skeleton-location-time">
                    <div class="skeleton-location skeleton"></div>
                    <div class="skeleton-time skeleton"></div>
                  </div>
                </div>
                <div class="skeleton-price-section">
                  <div class="skeleton-price skeleton"></div>
                  <div class="skeleton-view skeleton"></div>
                </div>
              </div>
            </div>

            <div class="event-card">
              <div class="skeleton-image skeleton"></div>
              <div class="skeleton-details">
                <div class="skeleton-title skeleton"></div>
                <div class="skeleton-category skeleton"></div>
                <div class="skeleton-info">
                  <div class="skeleton-date">
                    <div class="skeleton-month skeleton"></div>
                    <div class="skeleton-day skeleton"></div>
                  </div>
                  <div class="skeleton-location-time">
                    <div class="skeleton-location skeleton"></div>
                    <div class="skeleton-time skeleton"></div>
                  </div>
                </div>
                <div class="skeleton-price-section">
                  <div class="skeleton-price skeleton"></div>
                  <div class="skeleton-view skeleton"></div>
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <div id="footer-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/notyf/notyf.min.js"></script>
  </body>
</html>
